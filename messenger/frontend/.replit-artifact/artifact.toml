kind = "web"
previewPath = "/"
title = "Messenger"
version = "1.0.0"
id = "artifacts/messenger"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22130

[services.development]
run = "pnpm --filter @workspace/messenger run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/messenger", "run", "build" ]
publicDir = "artifacts/messenger/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22130"
BASE_PATH = "/"
